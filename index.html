    <style>
        :root {
            --primary: #8bc34a; --secondary: #4caf50; --dark: #2e7d32; --light: #f1f8e9;
            --accent: #ffb300; --text: #333; --white: #fff;
        }
        body, html { margin: 0; padding: 0; font-family: 'Nunito', 'Kosugi Maru', sans-serif; background-color: var(--light); color: var(--text); }
        
        /* Map Section */
        #map { height: 45vh; width: 100%; border-bottom: 4px solid var(--primary); z-index: 1; }
        
        /* Dashboard Container */
        .dashboard { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .title-box { h1 { margin: 0; color: var(--dark); font-weight: 900; font-size: 2.2rem; display: flex; align-items: center; gap: 10px; } }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .sort-select { padding: 8px 15px; border-radius: 20px; border: 2px solid #ddd; font-family: inherit; font-weight: bold; color: var(--dark); background: var(--white); cursor: pointer; outline: none; transition: border-color 0.3s; }
        .sort-select:focus { border-color: var(--primary); }
        .stats { background: var(--white); padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-weight: bold; color: var(--dark); }
        
        /* Accordion Panel */
        .filter-panel { background: var(--white); border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .filter-header { padding: 15px 25px; background: linear-gradient(135deg, #f1f8e9 0%, #ffffff 100%); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: var(--dark); user-select: none; transition: background 0.3s; }
        .filter-header:hover { background: #e8f5e9; }
        .filter-header .title-left { display: flex; align-items: center; gap: 10px; }
        .filter-header .preview-text { font-size: 0.9rem; color: #666; font-weight: normal; background: #eee; padding: 3px 10px; border-radius: 12px; }
        .toggle-icon { transition: transform 0.3s; }
        .filter-content { padding: 20px 25px; display: flex; flex-wrap: wrap; gap: 10px; border-top: 1px solid #eee; display: none; }
        .filter-content.active { display: flex; }
        
        /* Buttons */
        .btn { padding: 8px 18px; border: 2px solid transparent; border-radius: 20px; background: #f5f5f5; color: #555; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 0.95rem; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn:hover { background: #e0e0e0; transform: translateY(-2px); }
        .btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(139, 195, 74, 0.4); }
        
        /* Gallery */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: var(--white); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.08); transition: transform 0.3s, box-shadow 0.3s; position: relative; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); cursor: pointer; }
        .card-img-wrap { width: 100%; padding-top: 67%; position: relative; background: #f0f0f0; }
        .card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-title { margin: 0 0 5px; font-size: 1.2rem; font-weight: 800; color: #222; line-height: 1.3; }
        .card-location { display: inline-block; background: #e3f2fd; color: #1976d2; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; margin-bottom: 12px; }
        .card-category { font-size: 0.8rem; color: #9c27b0; font-weight: bold; margin-bottom: 10px; }
        .card-subtitle { font-size: 0.85rem; color: #777; margin-bottom: 12px; min-height: 20px; line-height: 1.4; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #eee; padding-top: 15px; margin-top: 5px; }
        .sender-tag { background: #fff3e0; color: #e65100; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        
        /* Lightbox */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox img { max-width: 90%; max-height: 90vh; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); object-fit: contain; }
        .lightbox-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; font-weight: 300; transition: transform 0.2s; }
        .lightbox-close:hover { transform: scale(1.1); }
        
        /* Edit Mode */
        .btn-edit-mode { background: #ff9800; color: white; padding: 8px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-edit-mode:hover { background: #f57c00; }
        .floating-save { position: fixed; bottom: 30px; right: 30px; background: #e91e63; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4); display: none; z-index: 1000; transition: transform 0.2s; }
        .floating-save.active { display: block; }
        .floating-save:hover { transform: scale(1.05); }
        .edit-select { width: 100%; padding: 4px; margin-top: 5px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; font-size: 0.85rem; font-weight: bold; color: #444; }
        .edit-input { width: 100%; padding: 6px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; font-size: 1rem; font-weight: bold; color: #222; box-sizing: border-box; }
        .sender-input { font-size: 0.85rem; color: #e65100; background: #fff3e0; border-color: #ffcc80; border-radius: 20px; padding: 4px 12px; }
    </style>
</head>

                <button class="btn" onclick="filterGallery('sender', '雪莉媽咪', this)">雪莉媽咪</button>
                <button class="btn" onclick="filterGallery('sender', '靜靜走', this)">靜靜走</button>
                <button class="btn" onclick="filterGallery('sender', '鬼鬼', this)">鬼鬼</button>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding: 0 10px;">
            <div class="stats" id="stats-counter" style="font-size: 1.1rem;">共 0 張明信片</div>
            <div>
                <span style="font-weight: bold; margin-right: 10px; color: #555;">排序方式：</span>
                <select id="sortSelect" class="sort-select" onchange="renderGallery()">
                    <option value="default">↕️ 預設排序</option>
                    <option value="region">🌍 依地區排序</option>
                    <option value="sender">💌 依寄件人排序</option>
                    <option value="category">🎨 依類型排序</option>
                </select>
            </div>
        </div>

        <div class="gallery" id="gallery">
        </div>

        <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Full view">
    </div>

    <!-- Edit Mode Floating Save -->
    <button class="floating-save" id="floatingSaveBtn" onclick="downloadDataJs()">💾 儲存並下載 data.js</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script>
        // Data variables
        let currentFilters = { region: 'all', sender: 'all', category: 'all' };
        
        let flagMap = {
            '日本': '🇯🇵', '新加坡': '🇸🇬', '紐西蘭': '🇳🇿', '挪威': '🇳🇴',
            '冰島': '🇮🇸', '法國': '🇫🇷', '英國': '🇬🇧', '義大利': '🇮🇹',
            '美國': '🇺🇸', '捷克': '🇨🇿', '澳門': '🇲🇴', '香港': '🇭🇰',
            '其他': '❓'
        };

        function togglePanel(contentId, iconId) {
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                icon.style.transform = 'rotate(-90deg)';
            } else {
                content.classList.add('active');
                icon.style.transform = 'rotate(0)';
            }
        }

        let isEditMode = false;
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editModeBtn');
            const saveBtn = document.getElementById('floatingSaveBtn');
            if(isEditMode) {
                btn.innerText = '❌ 退出編輯模式';
                btn.style.background = '#f44336';
                if(saveBtn) saveBtn.classList.add('active');
            } else {
                btn.innerText = '✏️ 啟用編輯模式';
                btn.style.background = '#ff9800';
                if(saveBtn) saveBtn.classList.remove('active');
            }
            renderGallery();
        }

        function updateCardData(filename, field, value) {
            const card = postcards.find(c => c.filename === filename);
            if (card) {
                card[field] = value;
            }
        }

        function downloadDataJs() {
            const jsContent = 'const postcards = ' + JSON.stringify(postcards, null, 4) + ';\n';
            const blob = new Blob([jsContent], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.js';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert('已下載更新後的 data.js！\n\n請將下載的檔案移動並覆蓋掉桌面 PikminGallery 資料夾原本的 data.js。');
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            // 1. Filter
            let filteredCards = postcards.filter(card => {
                if (currentFilters.region !== 'all' && card.region !== currentFilters.region) return false;
                if (currentFilters.sender !== 'all' && card.sender !== currentFilters.sender) return false;
                if (currentFilters.category !== 'all' && card.category !== currentFilters.category) return false;
                return true;
            });
            
            // 2. Sort
            const sortVal = document.getElementById('sortSelect') ? document.getElementById('sortSelect').value : 'default';
            if (sortVal === 'region') {
                filteredCards.sort((a, b) => a.region.localeCompare(b.region, 'zh-TW'));
            } else if (sortVal === 'sender') {
                filteredCards.sort((a, b) => a.sender.localeCompare(b.sender, 'zh-TW'));
            } else if (sortVal === 'category') {
                filteredCards.sort((a, b) => a.category.localeCompare(b.category, 'zh-TW'));
            }
            
            // 3. Render
            filteredCards.forEach(card => {
                let flag = flagMap[card.region] || '📍';
                
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.setAttribute('data-region', card.region);
                cardDiv.setAttribute('data-sender', card.sender);
                cardDiv.setAttribute('data-category', card.category);
                cardDiv.onclick = (e) => {
                    // Prevent opening lightbox if clicking on a select dropdown or input
                    if(e.target.tagName !== 'SELECT' && e.target.tagName !== 'INPUT') {
                        openLightbox(card.filename);
                    }
                };
                
                let locationHtml = `<div class="card-location">${flag} ${card.region}</div>`;
                let categoryHtml = `<div class="card-category">🏷️ ${card.category}</div>`;
                let titleHtml = `<h3 class="card-title">${card.title}</h3>`;
                let senderHtml = `<div class="sender-tag">💌 ${card.sender}</div>`;
                
                if (isEditMode) {
                    const allCategories = ['建築/設施', '雕像/地標', '裝置藝術', '公共場所', '壁畫/藝術', '自然/風景', '海岸', '步道', '瀑布', '森林', '農場', '生態', '風景區', '觀光區', '人文/生活', '神社/廟宇', '街景', '其他'];
                    const allRegions = ['基隆市', '台北市', '新北市', '桃園市', '新竹縣', '台中市', '彰化縣', '南投縣', '雲林縣', '嘉義縣', '台南市', '高雄市', '屏東縣', '宜蘭縣', '花蓮縣', '台東縣', '日本', '新加坡', '紐西蘭', '挪威', '冰島', '法國', '英國', '義大利', '美國', '捷克', '澳門', '香港', '火影系列', '其他'];
                    
                    locationHtml = `<select class="edit-select" onclick="event.stopPropagation()" onchange="updateCardData('${card.filename}', 'region', this.value)">`;
                    allRegions.forEach(reg => {
                        locationHtml += `<option value="${reg}" ${card.region === reg ? 'selected' : ''}>${reg}</option>`;
                    });
                    locationHtml += `</select>`;
                    
                    categoryHtml = `<select class="edit-select" onclick="event.stopPropagation()" onchange="updateCardData('${card.filename}', 'category', this.value)">`;
                    allCategories.forEach(cat => {
                        categoryHtml += `<option value="${cat}" ${card.category === cat ? 'selected' : ''}>${cat}</option>`;
                    });
                    categoryHtml += `</select>`;
                    
                    titleHtml = `<input type="text" class="edit-input" value="${card.title}" onclick="event.stopPropagation()" onchange="updateCardData('${card.filename}', 'title', this.value)" placeholder="明信片名稱">`;
                    senderHtml = `<input type="text" class="edit-input sender-input" value="${card.sender}" onclick="event.stopPropagation()" onchange="updateCardData('${card.filename}', 'sender', this.value)" placeholder="寄件人">`;
                }
                
                cardDiv.innerHTML = `
                    <div class="card-img-wrap"><img src="${card.filename}" loading="lazy" alt="postcard"></div>
                    <div class="card-info">
                        ${titleHtml}
                        ${locationHtml}
                        <div class="card-subtitle">${card.subtitle}</div>
                        ${categoryHtml}
                        <div class="card-footer">
                            ${senderHtml}
                        </div>
                    </div>
                `;
                gallery.appendChild(cardDiv);
            });
            
            const statsElement = document.getElementById('stats-counter') || document.querySelector('.stats');
            if(statsElement) statsElement.innerText = `共 ${filteredCards.length} 張明信片`;
        }

        function filterGallery(type, value, btnElement) {
            currentFilters[type] = value;
            
            const container = btnElement.parentElement;
            container.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            const previewText = btnElement.innerText;
            document.getElementById(type + '-preview').innerText = previewText;
            
            renderGallery();
        }

        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Initialize map
        var map = L.map('map').setView([23.6978, 120.9605], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Render initially
        if (typeof postcards !== 'undefined') {
            renderGallery();
        }
    </script>
</body>
</html>
